spring.application.name=relive-backend

# ==============================
# DATABASE ? SQLite (embedded, zero-config)
# ==============================
spring.datasource.url=jdbc:sqlite:${user.home}/.relive/relive.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite-specific Hibernate dialect
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SQLite does not support deferred constraints ? disable them
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ==============================
# FILE UPLOAD LIMITS
# ==============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# ==============================
# AI SERVICE CONFIGURATION
# ==============================
ai.service.url=http://localhost:5000

# ==============================
# MEDIA STORAGE
# Data dir resolves to ~/.relive/uploads on all platforms.
# Override with -Drelive.data.dir=/custom/path if needed.
# ==============================
relive.data.dir=${user.home}/.relive
media.upload.path=${relive.data.dir}/uploads